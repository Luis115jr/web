<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💛</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial;
  color:white;
  text-align:center;
}

#inicio{
  position:absolute;
  top:40%;
  width:100%;
}

button{
  padding:10px 20px;
  margin:10px;
  font-size:16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

#si{ background:green; color:white; }
#no{ background:red; color:white; }

canvas{
  display:none;
}
</style>
</head>

<body>

<div id="inicio">
  <h2>¿Quieres ver algo bonito? 💛</h2>
  <button id="si">Sí</button>
  <button id="no">No</button>
  <p id="respuesta"></p>
</div>

<canvas id="canvas"></canvas>

<script>
const btnSi = document.getElementById("si");
const btnNo = document.getElementById("no");
const inicio = document.getElementById("inicio");
const respuesta = document.getElementById("respuesta");

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let cx = canvas.width / 2;
let cy = canvas.height / 2;

let petalos = 28;
let capas = 18;

let paso = 0;
let total = petalos * capas;

let duracion = 8000;
let delay = duracion / total;

// BOTÓN SI
btnSi.onclick = ()=>{
  inicio.style.display = "none";
  canvas.style.display = "block";
  animar();
};

// BOTÓN NO 😏
btnNo.onclick = ()=>{
  respuesta.innerText = "Igual lo verás 😏💛";
};

// 🌼 DIBUJO PETALO
function dibujarPetalo(p, c){
  let ang = (Math.PI * 2 / petalos) * p;
  let largo = 180 - c * 6;
  let ancho = 60 - c * 2;

  let x1 = cx + Math.cos(ang) * 20;
  let y1 = cy + Math.sin(ang) * 20;

  let x2 = cx + Math.cos(ang) * largo;
  let y2 = cy + Math.sin(ang) * largo;

  let ctrl1x = cx + Math.cos(ang - 0.5) * ancho;
  let ctrl1y = cy + Math.sin(ang - 0.5) * ancho;

  let ctrl2x = cx + Math.cos(ang + 0.5) * ancho;
  let ctrl2y = cy + Math.sin(ang + 0.5) * ancho;

  ctx.strokeStyle = "gold";
  ctx.lineWidth = 1;

  ctx.beginPath();
  ctx.moveTo(x1, y1);

  ctx.quadraticCurveTo(ctrl1x, ctrl1y, x2, y2);
  ctx.quadraticCurveTo(ctrl2x, ctrl2y, x1, y1);

  ctx.stroke();
}

// 🌼 ANIMACIÓN
function animar(){
  if(paso < total){
    let p = Math.floor(paso / capas);
    let c = paso % capas;

    dibujarPetalo(p, c);

    paso++;
    setTimeout(animar, delay);
  } else {
    dibujarCentro();
    dibujarTallo();
  }
}

// 🌟 CENTRO + MENSAJE
function dibujarCentro(){
  let grad = ctx.createRadialGradient(cx, cy, 10, cx, cy, 70);
  grad.addColorStop(0, "#FFD700");
  grad.addColorStop(1, "#FF8C00");

  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy, 70, 0, Math.PI * 2);
  ctx.fill();

  // 💛 TEXTO CENTRADO
  ctx.fillStyle = "white";
  ctx.font = "22px Arial";
  ctx.textAlign = "center";

  ctx.fillText("Para ti Cereza 💛", cx, 60);
  ctx.fillText("Eres muy especial para mí,", cx, 90);
  ctx.fillText("aunque peleemos muchote,", cx, 120);
  ctx.fillText("igual te quiero un montón 💛", cx, 150);
}

// 🌱 TALLO
function dibujarTallo(){
  ctx.strokeStyle = "#00ff88";
  ctx.lineWidth = 5;

  ctx.beginPath();
  ctx.moveTo(cx, cy + 70);

  ctx.quadraticCurveTo(
    cx + 30, cy + 200,
    cx - 10, canvas.height - 50
  );

  ctx.stroke();
}
</script>

</body>
</html>
